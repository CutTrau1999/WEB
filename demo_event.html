<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Demo Event</title>
</head>
<body>
    <button onclick="clickHere()">Click here to 18+</button>
    <button onmouseover="mouseTo()">Mouse over here to ...</button>
    <button onmouseleave="mouseLeave(this)">Mouse leave...</button>
    <button onmouseleave="mouseLeave(this)">Mouse leave2...</button>
    <p onmouseleave="mouseLeave(this)">ô ơi cho tôi mượn nick với, nick tôi đang bị ban 7 ngày nên k chơi được. Hứa là chỉ mượn làm đôi trận thôi :(((</p>
    <input onkeyup="keyDown(this)" type="text" name="abc" placeholder="Demo js with input"/>
    <input onkeypress="keyPress(this)" type="text" placeholder="Demo2"/>
    <select name="select" onchange="select(this)">
        <option value="1">Value 1</option>
        <option value="2">Value 2</option>
    </select>

    <script type="text/javascript">
        function  clickHere() {
            alert("Bi lua roi, ko co dau!");
        }
        function mouseTo() {
            alert("Mouse enter...")
        }
        function mouseLeave(e) {
            alert(e.innerText);
        }
        function keyDown(e) {
            if (event.keyCode == 13) {
                alert("Vua nhan phim enter");
            } else {
                console.log(e.value);
            }
        }
        function keyPress(e) {
            console.log(e.value);
        }
        function select(e) {
            console.log("change value");

        }

    </script>
</body>
</html>
